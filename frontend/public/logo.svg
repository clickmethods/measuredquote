<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Measured Quote mark: tape measure in rounded square -->
  <rect x="4" y="10" width="52" height="44" rx="10" stroke="#1D4ED8" stroke-width="4.5"/>
  <!-- tape body -->
  <circle cx="29" cy="31" r="12.5" stroke="#1D4ED8" stroke-width="4"/>
  <!-- spiral -->
  <path d="M29 31c0-2.2 1.8-4 4-4 2.5 0 4.5 2 4.5 4.5" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <!-- tick marks around tape -->
  <g stroke="#1D4ED8" stroke-width="2.2" stroke-linecap="round">
    <path d="M29 16.5v3.5"/>
    <path d="M21 19l1.8 2.9"/>
    <path d="M15.5 26l3.2 1.3"/>
    <path d="M14.5 34.5l3.5-.6"/>
    <path d="M18 42l2.7-2.2"/>
  </g>
  <!-- tape tab + lead -->
  <path d="M41.5 31v11.5h6" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="43.5" y="24" width="5" height="8" rx="1.5" fill="#1D4ED8"/>
</svg>
